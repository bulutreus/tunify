<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <title>Tunify Premium</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <meta property="og:title" content="Tunify Premium">
  <meta property="og:image" content="logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Tunify">
  <style>
    :root{
      --bg:#121212;
      --accent:#1ed760;
      --text:#ffffff;
      --muted:#c9c9c9;
      --grad:#7a1f22;       /* kapaktan hesaplanan baskin renk */
      --grad-dark:#2a0d0e;  /* baskin rengin koyulastirilmis hali */
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; padding:0; height:100%; }
    body{
      font-family:'Circular','Inter','Helvetica Neue',Arial,sans-serif;
      color:var(--text); background:var(--bg);
      min-height:100vh; min-height:100dvh; overflow:hidden;
    }

    /* Arka plan: gradient veya tam ekran video */
    #bg{
      position:fixed; inset:0; z-index:0;
      background:linear-gradient(180deg, var(--grad) 0%, var(--grad) 20%, var(--grad-dark) 100%);
      transition:background 0.6s ease;
    }
    #bg video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
    body.video #bg video{ display:block; }
    #bg::after{
      content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,0.35) 100%);
    }
    body.video #bg::after{
      background:linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.30) 45%, rgba(0,0,0,0.82) 100%);
    }

    .screen{
      position:relative; z-index:1; max-width:460px; margin:0 auto;
      height:100vh; height:100dvh; display:flex; flex-direction:column;
      padding:10px 22px calc(10px + env(safe-area-inset-bottom));
      overflow:hidden;
    }

    /* Ust bar */
    .top-bar{
      display:flex; align-items:center; justify-content:space-between;
      padding-top:6px; height:42px; flex:0 0 auto;
    }
    .top-bar .ctx{
      flex:1; text-align:center; font-size:14px; font-weight:700; color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 8px;
    }
    .icon-btn{
      background:none; border:none; color:#fff; cursor:pointer; padding:0;
      width:34px; height:34px; display:flex; align-items:center; justify-content:center; flex:0 0 auto;
    }
    .icon-btn svg{ width:24px; height:24px; display:block; }

    /* Buyuk kapak */
    .cover-wrap{ flex:1 1 auto; display:flex; align-items:center; justify-content:center; padding:14px 0; min-height:0; }
    .cover-art{
      width:min(90vw, 62vh, 420px); aspect-ratio:1/1;
      border-radius:8px; overflow:hidden; background:#222;
      box-shadow:0 16px 44px rgba(0,0,0,0.55);
    }
    .cover-art img{ width:100%; height:100%; object-fit:cover; display:block; }
    body.video .cover-wrap{ display:none; }

    /* Soz teaser (kapak ile baslik arasi kalin satir) */
    .lyric-teaser{
      font-size:23px; font-weight:800; letter-spacing:-0.3px; line-height:1.2;
      color:#fff; margin:6px 0 14px; flex:0 0 auto;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    body.video .lyric-teaser{ margin-top:auto; }

    /* Baslik satiri + aksiyonlar */
    .meta{ display:flex; align-items:center; gap:12px; flex:0 0 auto; }
    .meta .thumb{ width:48px; height:48px; border-radius:5px; overflow:hidden; background:#333; flex:0 0 auto; display:none; }
    .meta .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
    body.video .meta .thumb{ display:block; }
    .meta .txt{ flex:1; min-width:0; }
    .meta .title{ font-size:23px; font-weight:800; letter-spacing:-0.3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta .artist{ font-size:15px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .act{ background:none; border:none; color:#fff; cursor:pointer; padding:4px; flex:0 0 auto; }
    .act svg{ width:26px; height:26px; display:block; }
    .act.add.on{ color:var(--accent); }

    /* Ilerleme */
    .progress{ margin-top:18px; flex:0 0 auto; }
    .bar{ position:relative; height:4px; border-radius:2px; background:rgba(255,255,255,0.30); cursor:pointer; }
    .bar .fill{ position:absolute; left:0; top:0; bottom:0; width:0%; background:#fff; border-radius:2px; }
    .bar .knob{ position:absolute; top:50%; left:0%; width:12px; height:12px; background:#fff; border-radius:50%; transform:translate(-50%,-50%) scale(0); transition:transform .12s; }
    .bar:hover .knob{ transform:translate(-50%,-50%) scale(1); }
    .times{ display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:7px; font-variant-numeric:tabular-nums; }

    /* Kontroller */
    .controls{ display:flex; align-items:center; justify-content:space-between; margin-top:12px; flex:0 0 auto; }
    .ctl{ background:none; border:none; color:#fff; cursor:pointer; padding:6px; display:flex; align-items:center; justify-content:center; }
    .ctl svg{ width:30px; height:30px; display:block; }
    .ctl.small svg{ width:25px; height:25px; }
    .ctl.dim{ color:rgba(255,255,255,0.55); }
    .ctl.toggle{ color:#fff; position:relative; }
    .ctl.toggle.on{ color:var(--accent); }
    .ctl.toggle.on::after{ content:""; position:absolute; bottom:-1px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--accent); }
    .play-btn{ background:#fff; border:none; cursor:pointer; width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(0,0,0,0.4); transition:transform .08s; }
    .play-btn:active{ transform:scale(.94); }
    .play-btn svg{ width:26px; height:26px; color:#000; display:block; }

    /* Alt bar */
    .bottom{ display:flex; align-items:center; justify-content:space-between; margin-top:16px; flex:0 0 auto; }
    .bottom .grp{ display:flex; align-items:center; gap:22px; }
    .bottom .icon-btn svg{ width:20px; height:20px; }

    /* Alt soz onizleme paneli */
    .lyrics-peek{
      margin:14px -22px calc(-10px - env(safe-area-inset-bottom));
      background:var(--grad); border-radius:14px 14px 0 0;
      padding:16px 22px 26px; flex:0 0 auto;
      box-shadow:inset 0 0 0 100vh rgba(0,0,0,0.14);
      transition:background 0.6s ease;
    }
    .lyrics-peek{ cursor:pointer; }
    .lyrics-peek .lh{ font-size:16px; font-weight:800; }
    .lyrics-peek .lp{ font-size:15px; font-weight:600; opacity:0.75; margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Tam ekran sozler gorunumu */
    #lyrics-view{
      position:fixed; inset:0; z-index:20; background:var(--grad);
      display:flex; flex-direction:column; transform:translateY(100%);
      transition:transform .34s cubic-bezier(.4,0,.2,1); visibility:hidden;
    }
    #lyrics-view.open{ transform:translateY(0); visibility:visible; }
    #lyrics-view::before{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.34)); pointer-events:none; }
    .lv-top{
      position:relative; z-index:1; flex:0 0 auto;
      display:flex; align-items:center; justify-content:space-between;
      padding:calc(10px + env(safe-area-inset-top)) 18px 6px;
    }
    .lv-title{ flex:1; text-align:center; font-size:14px; font-weight:800; padding:0 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lv-title small{ display:block; font-weight:600; opacity:.75; font-size:12px; margin-top:1px; }
    .lv-scroll{
      position:relative; z-index:1; flex:1 1 auto; overflow-y:auto;
      padding:14vh 26px 34vh; -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .lv-scroll::-webkit-scrollbar{ display:none; }
    .lv-line{
      font-size:28px; font-weight:800; line-height:1.26; letter-spacing:-.4px;
      color:rgba(255,255,255,.42); margin:0 0 24px; cursor:pointer;
      transition:color .28s ease, opacity .28s ease;
    }
    .lv-line.active{ color:#fff; }
    .lv-line.past{ color:rgba(255,255,255,.55); }
    .lv-empty{ font-size:19px; font-weight:600; opacity:.85; line-height:1.5; }
  </style>
</head>
<body>
  <div id="bg"><video id="bg-video" muted loop playsinline></video></div>

  <div class="screen">
    <div class="top-bar">
      <button class="icon-btn" title="Kapat" onclick="history.length>1&&history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="ctx" id="ctx">Tuana ♡ Bulut</div>
      <button class="icon-btn" title="Menü">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </button>
    </div>

    <div class="cover-wrap">
      <div class="cover-art"><img id="main-cover" src="1.jpg" alt="Kapak"></div>
    </div>

    <div class="lyric-teaser" id="lyric-teaser"></div>

    <div class="meta">
      <div class="thumb"><img id="thumb-img" src="1.jpg" alt=""></div>
      <div class="txt">
        <div class="title" id="song-title">Herkesim</div>
        <div class="artist" id="song-artist">Tuana ♡ Bulut</div>
      </div>
      <button class="act" id="act-x" title="Bu şarkıyı geç">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <button class="act add" id="act-add" title="Kaydet" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="progress">
      <div class="bar" id="bar">
        <div class="fill" id="fill"></div>
        <div class="knob" id="knob"></div>
      </div>
      <div class="times"><span id="cur">0:00</span><span id="rem">-0:00</span></div>
    </div>

    <div class="controls">
      <button class="ctl toggle small on" id="shuffle" title="Karıştır">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.6 9.2L5.4 4 4 5.4l5.2 5.2 1.4-1.4zM14.5 4l2 2L4 18.6 5.4 20 18 7.5l2 2V4h-5.5zm.3 9.4l-1.4 1.4 3.1 3.1L14.5 20H20v-5.5l-2 2-3.2-3.1z"/></svg>
      </button>
      <button class="ctl dim" id="prev" title="Önceki">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="play-btn" id="playpause" title="Oynat">
        <svg id="pp-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7L8 5z"/></svg>
      </button>
      <button class="ctl" id="next" title="Sonraki">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg>
      </button>
      <button class="ctl toggle small" id="timer" title="Uyku zamanlayıcı">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2h6" stroke-linecap="round"/><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="bottom">
      <div class="grp">
        <button class="icon-btn" title="Cihaza bağlan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="14" height="11" rx="1.5"/><path d="M3 19h12" stroke-linecap="round"/><rect x="16" y="9" width="6" height="11" rx="1.5"/></svg>
        </button>
      </div>
      <div class="grp">
        <button class="icon-btn" title="Paylaş">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13"/><path d="M8 7l4-4 4 4"/><path d="M5 12v8h14v-8"/></svg>
        </button>
        <button class="icon-btn" title="Sıradakiler">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 7h12M4 12h12M4 17h8"/><path d="M18 12v7l4-3.5z" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
    </div>

    <div class="lyrics-peek" id="peek">
      <div class="lh">Şarkı sözleri önizlemesi</div>
      <div class="lp" id="peek-line"></div>
    </div>
  </div>

  <div id="lyrics-view">
    <div class="lv-top">
      <button class="icon-btn" id="lv-close" title="Kapat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="lv-title" id="lv-title"></div>
      <button class="icon-btn" title="Menü">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
      </button>
    </div>
    <div class="lv-scroll" id="lv-scroll"></div>
  </div>

  <audio id="audio" src="1.mp3" preload="metadata"></audio>

  <script>
    const DEFAULT_LYRIC = "Tuana ♡ Bulut";  // song.lyric bos ise gosterilecek satir
    const songs = [
      { title:"Herkesim",              artist:"Tuana ♡ Bulut", src:"1.mp3",  cover:"1.JPG",  lyric:"" },
      { title:"Cenneti Müjdeleyen",    artist:"Tuana ♡ Bulut", src:"2.mp3",  cover:"2.JPG",  lyric:"" },
      { title:"Lambalar Ve Kelebek",   artist:"Tuana ♡ Bulut", src:"3.mp3",  cover:"3.JPG",  lyric:"" },
      { title:"Aşk Yok Olmaktır",      artist:"Tuana ♡ Bulut", src:"4.mp3",  cover:"4.JPG",  lyric:"" },
      { title:"Yanarım Sevgime",       artist:"Tuana ♡ Bulut", src:"5.mp3",  cover:"5.JPG",  lyric:"" },
      { title:"Yarım Kalanlar",        artist:"Tuana ♡ Bulut", src:"6.mp3",  cover:"6.JPG",  lyric:"" },
      { title:"Aşk Bilir",             artist:"Tuana ♡ Bulut", src:"7.mp3",  cover:"7.JPG",  lyric:"" },
      { title:"Benimle Kayboldun",     artist:"Tuana ♡ Bulut", src:"8.mp3",  cover:"8.JPG", video:"8.MOV", thumb:"8.PNG", lyric:"" },
      { title:"Nefret ve Aşk",         artist:"Tuana ♡ Bulut", src:"9.mp3",  cover:"9.JPG",  lyric:"" },
      { title:"Bir Sana",              artist:"Tuana ♡ Bulut", src:"10.mp3", cover:"10.JPG", lyric:"" },
      { title:"Seni Düşündüm",         artist:"Tuana ♡ Bulut", src:"11.mp3", cover:"11.JPG", lyric:"" },
      { title:"Geceyi Anlatmış",       artist:"Tuana ♡ Bulut", src:"12.mp3", cover:"12.JPG", lyric:"" }
    ];

    // === ŞARKI SÖZLERİ ===
    // Her şarkıya src üzerinden eşlenir. İki biçim desteklenir:
    //   1) Düz satırlar:   ["ilk mısra","ikinci mısra"]        -> süre boyunca otomatik eşit senkron
    //   2) Zaman damgalı:  [{t:9,text:"ilk mısra"}, {t:14,text:"ikinci"}]   (t = saniye)
    const LYRICS = {
      "1.mp3":  [],
      "2.mp3":  [],
      "3.mp3":  [],
      "4.mp3":  [],
      "5.mp3":  [],
      "6.mp3":  [],
      "7.mp3":  [],
      "8.mp3":  [],
      "9.mp3":  [],
      "10.mp3": [],
      "11.mp3": [],
      "12.mp3": []
    };
    const getLyrics = s => LYRICS[s.src] || [];
    const lyText = l => (typeof l==='object' ? l.text : l);

    let idx=0, shuffle=true, sleepStop=false, curLyrics=[], lyricsOpen=false;

    const $=id=>document.getElementById(id);
    const audio=$('audio'), mainCover=$('main-cover'), thumbImg=$('thumb-img'),
          bgVideo=$('bg-video'), titleEl=$('song-title'), artistEl=$('song-artist'),
          teaser=$('lyric-teaser'), peekLine=$('peek-line'), ppIcon=$('pp-icon'),
          fill=$('fill'), knob=$('knob'), curEl=$('cur'), remEl=$('rem');

    const ICON_PLAY='<path d="M8 5v14l11-7L8 5z"/>';
    const ICON_PAUSE='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

    const fmt=s=>{ if(!isFinite(s)||s<0) s=0; s=Math.floor(s); return Math.floor(s/60)+":"+("0"+(s%60)).slice(-2); };
    const baseOf=n=>n.replace(/\.(jpe?g|png)$/i,'');

    // Kapaktan Spotify tarzi baskin/canli renk cikar
    function applyCoverColor(url){
      const img=new Image(); img.crossOrigin="anonymous";
      img.onload=()=>{ try{
        const N=32, c=document.createElement('canvas'); c.width=c.height=N;
        const x=c.getContext('2d'); x.drawImage(img,0,0,N,N);
        const d=x.getImageData(0,0,N,N).data, buckets={};
        let ar=0,ag=0,ab=0,an=0;
        for(let i=0;i<d.length;i+=4){
          const r=d[i],g=d[i+1],b=d[i+2];
          ar+=r;ag+=g;ab+=b;an++;
          const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
          if(mx<24||mn>238||(mx-mn)<24) continue;            // cok koyu/acik/soluk atla
          const key=(r>>4)+","+(g>>4)+","+(b>>4);
          const bk=buckets[key]||(buckets[key]={n:0,r:0,g:0,b:0,s:0});
          bk.n++; bk.r+=r; bk.g+=g; bk.b+=b; bk.s+=(mx-mn);
        }
        let best=null,score=-1;
        for(const k in buckets){ const bk=buckets[k]; const sc=bk.n*(1+bk.s/bk.n/255); if(sc>score){score=sc;best=bk;} }
        let r,g,b;
        if(best){ r=Math.round(best.r/best.n); g=Math.round(best.g/best.n); b=Math.round(best.b/best.n); }
        else { r=Math.round(ar/an); g=Math.round(ag/an); b=Math.round(ab/an); }
        // cok koyuysa hafif ac
        const lum=0.299*r+0.587*g+0.114*b;
        if(lum<40){ const f=1.6; r=Math.min(255,r*f); g=Math.min(255,g*f); b=Math.min(255,b*f); }
        setGrad(r,g,b);
      }catch(e){ setGrad(122,31,34); } };
      img.onerror=()=>setGrad(122,31,34);
      img.src=url;
    }
    function setGrad(r,g,b){
      const rs=document.documentElement.style;
      rs.setProperty('--grad',`rgb(${r|0},${g|0},${b|0})`);
      rs.setProperty('--grad-dark',`rgb(${Math.round(r*0.34)},${Math.round(g*0.34)},${Math.round(b*0.34)})`);
    }

    // .jpg / .JPG toleransli yukleme
    function loadImageAny(el, base, cb){
      el.onerror=()=>{ el.onerror=()=>{el.onerror=null;cb&&cb(false);}; el.src=base+'.jpg'; };
      el.onload=()=>cb&&cb(true, el.currentSrc||el.src);
      el.src=base+'.JPG';
    }

    function load(){
      const s=songs[idx];
      titleEl.textContent=s.title;
      artistEl.textContent=s.artist;
      curLyrics=getLyrics(s);
      const firstLine = curLyrics.length ? lyText(curLyrics[0]) : (s.lyric||DEFAULT_LYRIC);
      teaser.textContent=firstLine; peekLine.textContent=firstLine;
      if(lyricsOpen) buildLyrics();
      const base=baseOf(s.cover);

      if(s.video){
        document.body.classList.add('video');
        bgVideo.src=s.video; bgVideo.load(); bgVideo.play().catch(()=>{});
        if(s.thumb){ thumbImg.src=s.thumb; applyCoverColor(s.thumb); }
        else loadImageAny(thumbImg, base, (ok,u)=>{ if(ok) applyCoverColor(u); });
      } else {
        document.body.classList.remove('video');
        bgVideo.pause(); bgVideo.removeAttribute('src');
        loadImageAny(mainCover, base, (ok,u)=>{ if(ok){ applyCoverColor(u); thumbImg.src=mainCover.src; } else setGrad(122,31,34); });
      }

      audio.src=s.src; audio.load();
      fill.style.width='0%'; knob.style.left='0%';
      curEl.textContent='0:00'; remEl.textContent='-0:00';
    }

    const play=()=>audio.play();
    const toggle=()=> audio.paused?audio.play():audio.pause();
    function next(){
      if(shuffle && songs.length>1){ let n=idx; while(n===idx) n=Math.floor(Math.random()*songs.length); idx=n; }
      else idx=(idx+1)%songs.length;
      load(); play();
    }
    function prev(){
      if(audio.currentTime>3){ audio.currentTime=0; return; }
      idx=(idx-1+songs.length)%songs.length; load(); play();
    }

    $('playpause').onclick=toggle;
    $('next').onclick=next;
    $('prev').onclick=prev;
    $('act-x').onclick=next;
    $('shuffle').onclick=e=>{ shuffle=!shuffle; e.currentTarget.classList.toggle('on',shuffle); };
    $('timer').onclick=e=>{ sleepStop=!sleepStop; e.currentTarget.classList.toggle('on',sleepStop); e.currentTarget.title=sleepStop?'Bu şarkının sonunda dur':'Uyku zamanlayıcı'; };
    $('act-add').onclick=e=>{ const on=e.currentTarget.classList.toggle('on'); e.currentTarget.setAttribute('aria-pressed',on); };

    audio.onplay =()=>ppIcon.innerHTML=ICON_PAUSE;
    audio.onpause=()=>ppIcon.innerHTML=ICON_PLAY;
    audio.onended=()=>{ if(sleepStop){ sleepStop=false; $('timer').classList.remove('on'); return; } next(); };
    audio.ontimeupdate=()=>{
      const p=audio.duration?(audio.currentTime/audio.duration*100):0;
      fill.style.width=p+'%'; knob.style.left=p+'%';
      curEl.textContent=fmt(audio.currentTime);
      remEl.textContent='-'+fmt(audio.duration-audio.currentTime);
      updateLyric(audio.currentTime);
    };

    // --- Sozler senkron ---
    function lyTimes(){
      const d=audio.duration||0;
      return curLyrics.map((l,i)=> (typeof l==='object' && l.t!=null) ? l.t : (d ? d*i/curLyrics.length : 0));
    }
    function activeIdx(t){ const T=lyTimes(); let k=-1; for(let i=0;i<T.length;i++){ if(T[i]<=t+0.15) k=i; else break; } return k; }
    function updateLyric(t){
      if(!curLyrics.length) return;
      const k=activeIdx(t);
      teaser.textContent = lyText(curLyrics[k<0?0:k]);
      if(lyricsOpen) highlight(k);
    }
    function buildLyrics(){
      const box=$('lv-scroll'); box.innerHTML='';
      $('lv-title').innerHTML = songs[idx].title + '<small>'+songs[idx].artist+'</small>';
      if(!curLyrics.length){ box.innerHTML='<div class="lv-empty">Bu şarkı için sözler henüz eklenmedi.</div>'; return; }
      curLyrics.forEach((l,i)=>{
        const d=document.createElement('div'); d.className='lv-line'; d.textContent=lyText(l);
        d.onclick=()=>{ const T=lyTimes(); audio.currentTime=T[i]||0; audio.play(); };
        box.appendChild(d);
      });
    }
    function highlight(k){
      const box=$('lv-scroll'), lines=box.querySelectorAll('.lv-line');
      lines.forEach((el,i)=>{ el.classList.toggle('active', i===k); el.classList.toggle('past', i<k); });
      if(k>=0 && lines[k]) box.scrollTo({ top: lines[k].offsetTop - box.clientHeight*0.36, behavior:'smooth' });
    }
    function openLyrics(){ buildLyrics(); $('lyrics-view').classList.add('open'); lyricsOpen=true; highlight(activeIdx(audio.currentTime)); }
    function closeLyrics(){ $('lyrics-view').classList.remove('open'); lyricsOpen=false; }
    $('peek').onclick=openLyrics;
    $('lv-close').onclick=closeLyrics;
    audio.onloadedmetadata=()=> remEl.textContent='-'+fmt(audio.duration);

    const bar=$('bar');
    bar.addEventListener('click',e=>{
      const r=bar.getBoundingClientRect();
      const x=((e.touches?e.touches[0].clientX:e.clientX)-r.left)/r.width;
      if(audio.duration) audio.currentTime=Math.min(1,Math.max(0,x))*audio.duration;
    });

    load();
  </script>
</body>
</html>
